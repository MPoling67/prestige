  <!-- Left crimson accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#861442"/>

  <!-- Icon — C variant, scaled up -->
  <rect x="80"  y="215" width="90" height="90" fill="#861442"/>
  <rect x="186" y="215" width="90" height="90" fill="#ffffff" opacity="0.6"/>
  <rect x="80"  y="321" width="90" height="90" fill="#ffffff" opacity="0.25"/>
  <rect x="186" y="321" width="90" height="90" fill="#861442" opacity="0.25"/>

  <!-- POWER wordmark -->
  <text x="320" y="310" font-family="Georgia, serif" font-weight="700" font-size="96" fill="#ffffff" letter-spacing="-2">POWER</text>

  <!-- Score wordmark -->
  <text x="322" y="390" font-family="Georgia, serif" font-weight="300" font-style="italic" font-size="80" fill="#be3650" letter-spacing="-1">Score</text>

